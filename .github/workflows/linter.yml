name: linter

on:
  push:
    paths: "*.py"

jobs:
  linter:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with: {python-version: '3.12'}
        
      - name: Install Linter
        run:  pip install ruff
        
      - name: Validate Code
        run:  ruff check .

  