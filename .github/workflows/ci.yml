name: wokflow

on:
  push:
    branches:
      - main

jobs:
  uptime:
    runs-on: ubuntu-latest
    steps:
      - name: Checking Uptime 
        run: uptime
      - name: Checking User Details
        run: w

  bash-completion:
    needs: uptime
    runs-on: ubuntu-latest
    steps:
      - name: Update Cache
        run: sudo apt-get update

      - name: Install bash-completion
        run: sudo apt-get install bash-completion -y