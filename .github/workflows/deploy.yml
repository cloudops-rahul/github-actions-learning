name: Deploy

on:
  workflow_dispatch:

  workflow_run:  
    workflows: [Build]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: self-hosted
    steps:
      - uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.KEY }}
          # port: ${{ secrets.PORT }}
          script: |
            if [ ! -d ~/sample-python-app ]; then
              git clone ${{ github.server_url }}/${{ github.repository }}.git ~/sample-python-app
            fi
            cd ~/sample-python-app
            git pull origin main
            if [ ! -f .env ]; then
              echo "ERROR: ~/sample-python-app/.env is missing. Create it once with DOCKERHUB_USER and DB credentials."
              exit 1
            fi
            docker compose pull
            docker compose up -d
            echo `hostname;hostname -I`
            echo ${{ github.server_url }}
            echo ${{ github.repository }}